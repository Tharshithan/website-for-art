<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import ReactDOM from 'react-dom/client';
    import { motion, AnimatePresence, Reorder } from 'framer-motion';
    import * as Lucide from 'lucide-react';

    const { 
      Settings, X, LogOut, Plus, Trash2, Save, Upload, RefreshCw,
      Image: ImageIcon, Mail, Facebook, Phone, 
      ChevronRight, GripVertical, Search 
    } = Lucide;

    // ─── imgbb Integration ────────────────────────────────────────────────────────
    // API key can be set via the Admin Panel → Settings without editing source code.
    // Optionally hard-code a fallback key here (leave empty to rely on the UI setting).
    const IMGBB_API_KEY_FALLBACK = ''; // ← optional hard-coded fallback key
    const IMGBB_USERNAME = 'tharshithan-thar'; // your imgbb username

    // Read the API key at runtime from localStorage (set via admin panel) or the fallback above.
    function getImgbbApiKey() {
      return localStorage.getItem('imgbb_api_key') || IMGBB_API_KEY_FALLBACK;
    }

    async function imgbbUploadFile(file) {
      const key = getImgbbApiKey();
      if (!key) throw new Error('No imgbb API key set. Enter your key in Admin Panel → Settings.');
      const toBase64 = f => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(f);
      });
      const b64 = await toBase64(file);
      const body = new FormData();
      body.append('key', key);
      body.append('image', b64);
      body.append('name', file.name.replace(/\.[^.]+$/, ''));
      const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body });
      if (!res.ok) throw new Error('imgbb upload failed (' + res.status + ')');
      const json = await res.json();
      if (!json.success) throw new Error(json.error?.message || 'imgbb upload failed');
      return { url: json.data.url, deleteUrl: json.data.delete_url, id: json.data.id };
    }

    async function imgbbFetchGallery() {
      const key = getImgbbApiKey();
      // Primary: authenticated account images API
      if (key) {
        try {
          const res = await fetch(
            `https://api.imgbb.com/1/account/images?key=${encodeURIComponent(key)}&page=1&per_page=200`
          );
          if (res.ok) {
            const json = await res.json();
            if (json.status === 200 && Array.isArray(json.data)) {
              return json.data.map((img, i) => ({
                id: img.id || Date.now() + i,
                title: img.title || `Artwork ${i + 1}`,
                category: 'Original Art',
                description: img.description || '',
                price: '',
                image: img.url,
                imgbbId: img.id,
                imgbbDeleteUrl: img.delete_url,
              }));
            }
          }
        } catch (_) {}
      }
      // Fallback: try public profile JSON endpoint (CORS permitting)
      try {
        const res = await fetch(`https://${IMGBB_USERNAME}.imgbb.com/?json=1`, { mode: 'cors' });
        if (res.ok) {
          const json = await res.json();
          const imgs = json.images || json.data || [];
          if (imgs.length) {
            return imgs.map((img, i) => ({
              id: img.id || Date.now() + i,
              title: img.title || `Artwork ${i + 1}`,
              category: 'Original Art',
              description: img.description || '',
              price: '',
              image: img.url || img.display_url,
            }));
          }
        }
      } catch (_) {}
      return null; // could not reach imgbb
    }

    function buildImageSrc(imageUrl, cacheBuster) {
      if (!imageUrl) return imageUrl;
      // Never modify data URLs — appending query params breaks them.
      if (imageUrl.startsWith('data:')) return imageUrl;
      if (!cacheBuster) return imageUrl;
      try {
        const parsed = new URL(imageUrl);
        parsed.searchParams.set('v', String(cacheBuster));
        return parsed.toString();
      } catch (_) {
        const joiner = imageUrl.includes('?') ? '&' : '?';
        return `${imageUrl}${joiner}v=${encodeURIComponent(cacheBuster)}`;
      }
    }
    // ─────────────────────────────────────────────────────────────────────────────

    const DEFAULT_ARTWORKS = [
      {
        id: 1,
        title: "Majestic Peacock",
        category: "Watercolour",
        description: "A vibrant watercolour study of a peacock in full display, capturing the iridescent blues and greens of its magnificent plumage with expressive brushwork and a lively paint-splash technique.",
        price: "£1,200",
        image: 'https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?w=800&q=80&auto=format&fit=crop',
      },
      {
        id: 2,
        title: "Moonlit Sanctuary",
        category: "Pastel & Charcoal",
        description: "A dramatic nocturnal composition rendered in white chalk and pastel on dark paper. A domed temple rises from the mist, glowing against a deep, storm-laden sky, evoking mystery and transcendence.",
        price: "£1,650",
        image: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80&auto=format&fit=crop',
      },
      {
        id: 3,
        title: "Enchanted Forest at Dusk",
        category: "Watercolour",
        description: "Bare winter trees silhouetted against a luminous wash of pinks, purples and blues. A deeply atmospheric landscape that captures the quiet magic of the forest in fading light.",
        price: "£980",
        image: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&q=80&auto=format&fit=crop',
      },
      {
        id: 4,
        title: "Grey Heron",
        category: "Photography",
        description: "A grey heron stands tall amid fallen autumn leaves and golden bamboo, captured in a moment of stillness. A testament to the quiet beauty of urban wildlife in the English countryside.",
        price: "£350",
        image: 'https://images.unsplash.com/photo-1618606370369-2e7af7ac8e2c?w=800&q=80&auto=format&fit=crop',
      }
    ];

    function App() {
      const [artworks, setArtworks] = useState(() => {
        const VERSION = 'v5'; // bumped: migrate legacy base64 images out of localStorage
        const savedVersion = localStorage.getItem('marries_gallery_art_version');
        if (savedVersion !== VERSION) {
          // On version change keep existing artwork metadata but strip any inline
          // base64 images — they balloon localStorage and prevent future saves.
          const prev = localStorage.getItem('marries_gallery_art');
          if (prev) {
            try {
              const parsed = JSON.parse(prev);
              const migrated = parsed.map(a => ({
                ...a,
                // Replace base64 data URLs with empty string so the URL field shows blank
                image: (a.image && a.image.startsWith('data:')) ? '' : (a.image || ''),
              }));
              localStorage.setItem('marries_gallery_art', JSON.stringify(migrated));
              localStorage.setItem('marries_gallery_art_version', VERSION);
              return migrated;
            } catch (e) { console.error('Gallery migration failed:', e); }
          }
          localStorage.removeItem('marries_gallery_art');
          localStorage.setItem('marries_gallery_art_version', VERSION);
          return DEFAULT_ARTWORKS;
        }
        const saved = localStorage.getItem('marries_gallery_art');
        if (saved) {
          try { return JSON.parse(saved); } catch (e) { console.error('Failed to parse saved gallery:', e); }
        }
        return DEFAULT_ARTWORKS;
      });

      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
      const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
      const [selectedArtwork, setSelectedArtwork] = useState(null);
      const [editingArtwork, setEditingArtwork] = useState(null);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [searchTerm, setSearchTerm] = useState('');
      const [toast, setToast] = useState(null);
      const [formErrors, setFormErrors] = useState({});
      const [isUploading, setIsUploading] = useState(false);
      const [imgbbSyncing, setImgbbSyncing] = useState(false);
      const [imgbbApiKeyInput, setImgbbApiKeyInput] = useState(() => localStorage.getItem('imgbb_api_key') || '');

      // Cursor state
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const [trailPos, setTrailPos] = useState({ x: 0, y: 0 });

      useEffect(() => {
        const handleMouseMove = (e) => {
          setMousePos({ x: e.clientX, y: e.clientY });
          setTimeout(() => setTrailPos({ x: e.clientX, y: e.clientY }), 80);
        };
        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem('marries_gallery_art', JSON.stringify(artworks));
        } catch (e) {
          // QuotaExceededError — storage full, usually caused by stale large data
          if (e && (e.name === 'QuotaExceededError' || e.code === 22)) {
            // Remove any artwork that still has a base64 image embedded and retry
            try {
              const slim = artworks.map(a => ({
                ...a,
                image: (a.image && a.image.startsWith('data:')) ? '' : (a.image || ''),
              }));
              localStorage.setItem('marries_gallery_art', JSON.stringify(slim));
            } catch (retryErr) { console.error('Gallery save failed (storage full):', retryErr); }
          }
        }
      }, [artworks]);

      // On mount: try to sync gallery from imgbb if no local data exists
      useEffect(() => {
        const hasLocalData = localStorage.getItem('marries_gallery_art');
        if (!hasLocalData || JSON.parse(hasLocalData).every(a => !a.image)) {
          imgbbFetchGallery().then(imgs => {
            if (imgs && imgs.length > 0) {
              const now = Date.now();
              setArtworks(imgs.map((img) => ({ ...img, imageVersion: now })));
            }
          }).catch(() => {});
        }
      }, []);

      const syncFromImgbb = async () => {
        setImgbbSyncing(true);
        try {
          const imgs = await imgbbFetchGallery();
          if (imgs && imgs.length > 0) {
            const now = Date.now();
            setArtworks(imgs.map((img) => ({ ...img, imageVersion: now })));
            showToast(`Synced ${imgs.length} image(s) from imgbb`);
          } else {
            showToast(
              getImgbbApiKey()
                ? 'No images found on imgbb account.'
                : 'Enter your imgbb API key in Admin Panel → Settings to sync.',
              'error'
            );
          }
        } catch (err) {
          showToast('imgbb sync failed: ' + err.message, 'error');
        } finally {
          setImgbbSyncing(false);
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        // WARNING: This is client-side only and visible in source code
        if (username === 'admin' && password === 'admin123') {
          setIsAuthenticated(true);
          setIsLoginModalOpen(false);
          setUsername('');
          setPassword('');
          showToast('Logged in successfully');
        } else {
          setLoginError('Invalid credentials');
        }
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setIsAdminPanelOpen(false);
        showToast('Logged out');
      };

      const validateArtwork = (art) => {
        const errors = {};
        if (!art?.image || !art.image.trim()) {
          errors.image = 'Image URL is required.';
        } else {
          try { new URL(art.image.trim()); } catch (_) {
            errors.image = 'Please enter a valid image URL (e.g. https://example.com/image.jpg).';
          }
        }
        if (!art?.description || !art.description.trim()) {
          errors.description = 'Description is required.';
        }
        const rawPrice = art?.price ? art.price.trim().replace(/^[£$€¥]/, '').replace(/,/g, '') : '';
        if (!rawPrice) {
          errors.price = 'Price is required.';
        } else if (isNaN(Number(rawPrice)) || Number(rawPrice) <= 0) {
          errors.price = 'Price must be a positive number (e.g. £1200 or 1200).';
        }
        return errors;
      };

      const saveArtwork = () => {
        const errors = validateArtwork(editingArtwork);
        if (Object.keys(errors).length > 0) {
          setFormErrors(errors);
          showToast('Please fix the errors before saving.', 'error');
          return;
        }
        setFormErrors({});
        const normalizedImage = (editingArtwork.image || '').trim();
        const normalizedArtwork = { ...editingArtwork, image: normalizedImage };

        if (editingArtwork.id) {
          const now = Date.now();
          setArtworks(artworks.map((a) => {
            if (a.id !== editingArtwork.id) return a;
            const currentImage = (a.image || '').trim();
            const imageChanged = currentImage !== normalizedArtwork.image;
            const imageVersion = imageChanged
              ? now
              : a.imageVersion;
            return {
              ...normalizedArtwork,
              imageVersion,
            };
          }));
        } else {
          const now = Date.now();
          const newArt = { ...normalizedArtwork, id: now, imageVersion: now };
          setArtworks([...artworks, newArt]);
        }
        setEditingArtwork(null);
        showToast('Artwork saved successfully');
      };

      const deleteArtwork = (id) => {
        if (!confirm('Are you sure you want to delete this artwork?')) return;
        setArtworks(artworks.filter(a => a.id !== id));
        setEditingArtwork(null);
        showToast('Artwork deleted');
      };

      const handleImgbbFileUpload = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (!getImgbbApiKey()) {
          showToast('Enter your imgbb API key in Admin Panel → Settings to enable uploads.', 'error');
          return;
        }
        setIsUploading(true);
        try {
          const { url } = await imgbbUploadFile(file);
          setEditingArtwork(prev => ({ ...prev, image: url }));
          setFormErrors(prev => ({ ...prev, image: undefined }));
          showToast('Image uploaded to imgbb ✓');
        } catch (err) {
          showToast('Upload failed: ' + err.message, 'error');
        } finally {
          setIsUploading(false);
          e.target.value = '';
        }
      };

      const saveImgbbApiKey = () => {
        const trimmed = imgbbApiKeyInput.trim();
        if (trimmed) {
          localStorage.setItem('imgbb_api_key', trimmed);
          showToast('imgbb API key saved ✓');
        } else {
          localStorage.removeItem('imgbb_api_key');
          showToast('imgbb API key cleared');
        }
      };

      const filteredArtworks = artworks.filter(art => 
        art.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
        art.category.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return React.createElement('div', { className: "min-h-screen font-sans selection:bg-[#c9a84c] selection:text-[#0a0908]" },
        // Custom Cursor
        React.createElement('div', { 
          className: "custom-cursor fixed w-3 h-3 bg-[#c9a84c] rounded-full pointer-events-none z-[9999] mix-blend-difference -translate-x-1/2 -translate-y-1/2 transition-transform duration-100",
          style: { left: mousePos.x, top: mousePos.y }
        }),
        React.createElement('div', { 
          className: "custom-cursor fixed w-9 h-9 border border-[#c9a84c] rounded-full pointer-events-none z-[9998] opacity-50 -translate-x-1/2 -translate-y-1/2",
          style: { left: trailPos.x, top: trailPos.y }
        }),

        // Particles
        React.createElement('div', { className: "fixed inset-0 pointer-events-none z-0 overflow-hidden" },
          [...Array(15)].map((_, i) => 
            React.createElement('div', {
              key: i,
              className: "particle",
              style: {
                width: Math.random() * 3 + 1 + 'px',
                height: Math.random() * 3 + 1 + 'px',
                left: Math.random() * 100 + '%',
                background: `rgba(201, 168, 76, ${Math.random() * 0.3 + 0.05})`,
                animationDuration: Math.random() * 20 + 15 + 's',
                animationDelay: -Math.random() * 20 + 's',
              }
            })
          )
        ),

        // Navigation
        React.createElement('nav', { className: "fixed top-0 left-0 right-0 z-[100] flex items-center justify-between px-6 md:px-16 py-6 bg-gradient-to-b from-[rgba(10,9,8,0.95)] to-transparent backdrop-blur-sm" },
          React.createElement('a', { href: "#", className: "group" },
            React.createElement('h1', { className: "font-display text-xl tracking-[0.12em] text-[#c9a84c]" },
              "MARIE Gallery",
              React.createElement('span', { className: "block font-serif italic text-xs tracking-[0.3em] text-[#9a9080] font-light" }, "Fine Art Collection")
            )
          ),
          React.createElement('ul', { className: "hidden md:flex gap-10 list-none" },
            ['Gallery', 'About', 'Contact'].map((item) => 
              React.createElement('li', { key: item },
                React.createElement('a', { 
                  href: `#${item.toLowerCase()}`, 
                  className: "text-[0.75rem] tracking-[0.2em] uppercase text-[#9a9080] hover:text-[#c9a84c] transition-colors relative group"
                },
                  item,
                  React.createElement('span', { className: "absolute -bottom-1 left-0 right-full h-[1px] bg-[#c9a84c] transition-all group-hover:right-0" })
                )
              )
            )
          )
        ),

        // Hero
        React.createElement('section', { id: "home", className: "relative h-screen flex flex-col items-center justify-center overflow-hidden" },
          React.createElement('div', { className: "absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_40%,_rgba(201,168,76,0.06)_0%,_transparent_70%)] bg-[#0a0908]" }),
          React.createElement('div', { className: "absolute inset-0 opacity-[0.03]", style: { backgroundImage: 'repeating-linear-gradient(0deg,transparent,transparent 80px,#c9a84c 80px,#c9a84c 81px), repeating-linear-gradient(90deg,transparent,transparent 80px,#c9a84c 80px,#c9a84c 81px)' } }),
          
          React.createElement(motion.div, { 
            initial: { opacity: 0, y: 30 },
            animate: { opacity: 1, y: 0 },
            transition: { duration: 1.4, ease: [0.16, 1, 0.3, 1] },
            className: "text-center z-10"
          },
            React.createElement('p', { className: "text-[0.65rem] tracking-[0.4em] uppercase text-[#c9a84c] mb-6" }, "Original Fine Art · Handcrafted"),
            React.createElement('h2', { className: "font-serif text-[clamp(4rem,10vw,9rem)] font-light leading-[0.9] text-[#f5edd8] tracking-tight mb-6" },
              "MARIE", React.createElement('br'),
              React.createElement('em', { className: "italic text-[#c9a84c] not-italic block" }, "Gallery")
            ),
            React.createElement('p', { className: "font-serif italic text-xl text-[#9a9080] tracking-wider mb-12" }, "Where every brushstroke tells a story"),
            React.createElement('a', { 
              href: "#gallery", 
              className: "inline-flex items-center px-10 py-4 border border-[rgba(201,168,76,0.18)] text-[0.72rem] tracking-[0.3em] uppercase text-[#c9a84c] hover:bg-[#c9a84c] hover:text-[#0a0908] transition-all duration-500"
            }, "Explore the Collection")
          ),

          React.createElement('div', { className: "absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-3 text-[#9a9080] text-[0.65rem] tracking-[0.3em] uppercase" },
            React.createElement('div', { className: "w-[1px] h-16 bg-gradient-to-b from-[#c9a84c] to-transparent animate-pulse" }),
            "Scroll"
          )
        ),

        // About
        React.createElement('section', { id: "about", className: "bg-[#0f0e0c] py-32 px-6 md:px-16 relative overflow-hidden" },
          React.createElement('div', { className: "max-w-6xl mx-auto grid md:grid-cols-2 gap-24 items-center" },
            React.createElement(motion.div, { 
              initial: { opacity: 0, x: -40 },
              whileInView: { opacity: 1, x: 0 },
              viewport: { once: true },
              transition: { duration: 1 }
            },
              React.createElement('p', { className: "text-[0.65rem] tracking-[0.4em] uppercase text-[#c9a84c] mb-4" }, "About the Artist"),
              React.createElement('h3', { className: "font-serif text-[clamp(2.5rem,5vw,4.5rem)] font-light text-[#f5edd8] leading-[1.1]" },
